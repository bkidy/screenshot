version: '3.8'

services:
  screenshot-service:
    # 使用本地构建的镜像
    image: screenshot-service:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    init: true
    cap_add:
      - SYS_ADMIN
    container_name: screenshot-service
    restart: unless-stopped
    
    # 端口映射
    ports:
      - "3002:3002"
    
    # 工作目录和用户
    working_dir: /app
    user: "pptruser"
    
    # 环境变量
    environment:
      - NODE_ENV=production
      - PORT=3002
      - LOG_LEVEL=info
      - API_KEY=${API_KEY:-disabled}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    
    # 环境变量文件
    env_file:
      - ../.env
    
    # 文件挂载 - 只挂载日志目录
    volumes:
      - screenshot-logs:/var/log/screenshot-service
      - /etc/localtime:/etc/localtime:ro
    
    # 基础资源限制
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.25'
    
    # 健康检查 - 修复地址
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # 标签
    labels:
      - "com.screenshot-service.description=Screenshot Service with Custom Build"
      - "com.screenshot-service.version=1.0.0"

# 卷配置
volumes:
  screenshot-logs:
    driver: local 